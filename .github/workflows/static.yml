name: Deploy site
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: Build
        env:
          VITE_URL_API: ${{ secrets.VITE_URL_API }}
          VITE_URL_GIFTS: ${{ secrets.VITE_URL_GIFTS }}
          VITE_API_TOKEN: ${{ secrets.VITE_API_TOKEN }}
        run: |
          echo "API URL definida: $VITE_URL_API"
          bun run build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy
        uses: actions/deploy-pages@v4
